name: Validate Blog Ops

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - "README.md"
      - ".env"
      - ".env.example"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "posts/**"
      - "outputs/checks/**"
      - "outputs/publish_control/**"
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - "data/raw/**"
      - "data/processed/**"
      - "docs/brand/**"
      - "docs/operations/**"
      - "docs/strategy/**"
      - "docs/templates/**"
      - "outputs/reports/**"
      - "outputs/dashboards/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-blog-ops.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "AGENTS.md"
      - "README.md"
      - ".env"
      - ".env.example"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - "posts/**"
      - "outputs/checks/**"
      - "outputs/publish_control/**"
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - "data/raw/**"
      - "data/processed/**"
      - "docs/brand/**"
      - "docs/operations/**"
      - "docs/strategy/**"
      - "docs/templates/**"
      - "outputs/reports/**"
      - "outputs/dashboards/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/validate-blog-ops.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run validate
